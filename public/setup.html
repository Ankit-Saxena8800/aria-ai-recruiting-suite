<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA - First Time Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .setup-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .info-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: left;
        }

        .info-box h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .credential-item {
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
        }

        .credential-label {
            font-weight: 600;
            color: #667eea;
            display: inline-block;
            width: 100px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: 500;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="setup-card">
        <h1>🚀 First-Time Setup</h1>
        <p class="subtitle">Create your admin account to get started</p>

        <div class="info-box">
            <h3>Default Admin Credentials</h3>
            <div class="credential-item">
                <span class="credential-label">Username:</span>
                <span>admin</span>
            </div>
            <div class="credential-item">
                <span class="credential-label">Password:</span>
                <span>aria2024</span>
            </div>
        </div>

        <button id="setupBtn" onclick="setupAdmin()">Create Admin Account</button>

        <div id="status" style="display: none;"></div>

        <a href="/login.html" class="login-link">Already have an account? Login</a>
    </div>

    <script>
        async function setupAdmin() {
            const btn = document.getElementById('setupBtn');
            const statusDiv = document.getElementById('status');

            btn.disabled = true;
            btn.innerHTML = '<div class="loading"></div> Creating admin...';
            statusDiv.style.display = 'none';

            try {
                const response = await fetch('/api/setup-admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                statusDiv.style.display = 'block';

                if (data.success) {
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `
                        ✅ ${data.message}<br><br>
                        <strong>Your credentials:</strong><br>
                        Username: ${data.credentials.username}<br>
                        Password: ${data.credentials.password}<br><br>
                        <a href="/login.html" style="color: #155724; font-weight: 600;">Go to Login →</a>
                    `;
                    btn.style.display = 'none';
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ ' + data.message;
                    btn.disabled = false;
                    btn.innerHTML = 'Create Admin Account';
                }
            } catch (error) {
                statusDiv.style.display = 'block';
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Error: ' + error.message;
                btn.disabled = false;
                btn.innerHTML = 'Create Admin Account';
            }
        }
    </script>
</body>
</html>
