<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Comparison - Aria AI</title>
    <link rel="stylesheet" href="/components/toast.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #1A1A1A;
            min-height: 100vh;
            color: #FFFFFF;
            padding: 32px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at top right, rgba(239, 167, 63, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom left, rgba(37, 141, 88, 0.12) 0%, transparent 50%),
                radial-gradient(circle at center, rgba(186, 93, 7, 0.08) 0%, transparent 70%);
            animation: meshMove 30s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            left: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, rgba(37, 141, 88, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatReverse 25s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes meshMove {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        @keyframes floatReverse {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.05); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeInDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 12px;
            background: linear-gradient(
                135deg,
                #EFA73F 0%,
                #f4c15d 25%,
                #EFA73F 50%,
                #258D58 75%,
                #2ea76a 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            font-weight: 800;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            animation: gradientShift 8s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        .header p {
            color: #b8c1ec;
            font-size: 1.1em;
            font-weight: 500;
        }

        .back-btn {
            background: linear-gradient(135deg, #EFA73F 0%, #BA5D07 100%);
            color: #FFFFFF;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95em;
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(239, 167, 63, 0.2);
            animation: fadeIn 0.4s ease-out;
        }

        .back-btn:hover {
            transform: translateX(-5px) translateY(-2px);
            box-shadow: 0 8px 24px rgba(239, 167, 63, 0.4);
        }

        .card {
            background: linear-gradient(135deg, #313131 0%, #464646 100%);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(239, 167, 63, 0.15);
            border-radius: 24px;
            padding: 48px;
            margin-bottom: 32px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.6s ease-out;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(239, 167, 63, 0.3);
            box-shadow:
                0 12px 48px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        /* Mode Indicators */
        .mode-indicators {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            justify-content: center;
        }

        .mode-badge {
            padding: 10px 20px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 0.95em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }

        .mode-badge.active {
            background: linear-gradient(135deg, #EFA73F 0%, #BA5D07 100%);
            color: #FFFFFF;
            box-shadow: 0 4px 16px rgba(239, 167, 63, 0.3);
            animation: slideIn 0.4s ease-out;
        }

        .mode-badge.inactive {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.1);
        }

        @keyframes slideIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* File Upload Area */
        .file-upload-section {
            margin-bottom: 32px;
            animation: fadeIn 0.4s ease-out;
        }

        .file-upload-area {
            background: rgba(255, 255, 255, 0.04);
            border: 2px dashed rgba(239, 167, 63, 0.4);
            border-radius: 16px;
            padding: 48px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .file-upload-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(239, 167, 63, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .file-upload-area:hover::before {
            opacity: 1;
        }

        .file-upload-area:hover {
            border-color: #EFA73F;
            background: rgba(239, 167, 63, 0.08);
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(239, 167, 63, 0.2);
        }

        .file-upload-area.has-files {
            border-color: #258D58;
            background: rgba(37, 141, 88, 0.08);
        }

        .file-upload-area.has-files:hover {
            border-color: #258D58;
        }

        .file-upload-area input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .file-upload-area:hover .upload-icon {
            transform: scale(1.1) translateY(-5px);
        }

        .upload-text {
            color: #EFA73F;
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #a8b2d1;
            font-size: 0.9em;
        }

        .file-count {
            margin-top: 15px;
            padding: 12px 24px;
            background: rgba(37, 141, 88, 0.15);
            border: 1px solid rgba(37, 141, 88, 0.3);
            border-radius: 24px;
            color: #4ade80;
            font-weight: 600;
            display: inline-block;
            animation: fadeIn 0.3s ease-out;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 40px 0;
            color: #a8b2d1;
            font-weight: 600;
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 20px;
        }

        /* Form Fields */
        .form-section {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-section.faded {
            opacity: 0.3;
            pointer-events: none;
            filter: blur(2px);
        }

        label {
            display: block;
            margin-bottom: 12px;
            color: #EFA73F;
            font-weight: 600;
            font-size: 1.1em;
            letter-spacing: 0.3px;
        }

        label .optional {
            color: #a8b2d1;
            font-size: 0.85em;
            font-weight: 400;
        }

        textarea {
            width: 100%;
            padding: 18px 20px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: #FFFFFF;
            font-size: 1em;
            font-family: inherit;
            margin-bottom: 24px;
            transition: all 0.3s ease;
            min-height: 120px;
            resize: vertical;
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
            border-color: #EFA73F;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(239, 167, 63, 0.1), 0 8px 24px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Submit Button */
        .btn {
            background: linear-gradient(135deg, #EFA73F 0%, #BA5D07 100%);
            color: #FFFFFF;
            padding: 18px 48px;
            border: none;
            border-radius: 32px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(239, 167, 63, 0.3);
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 16px 40px rgba(239, 167, 63, 0.4);
        }

        .btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-text {
            position: relative;
            z-index: 1;
        }

        /* Loading State */
        .loading {
            display: none;
            text-align: center;
            padding: 48px;
            color: #EFA73F;
            font-size: 1.2em;
        }

        .loading.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #EFA73F;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Results Section */
        .result {
            display: none;
            margin-top: 40px;
        }

        .result.active {
            display: block;
            animation: fadeInUp 0.6s ease-out;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 2px solid rgba(239, 167, 63, 0.2);
        }

        .result-header h3 {
            color: #EFA73F;
            font-size: 1.8em;
            font-weight: 700;
        }

        .formatted-result {
            display: grid;
            gap: 24px;
        }

        .result-section {
            background: linear-gradient(
                135deg,
                rgba(45, 53, 97, 0.3) 0%,
                rgba(26, 31, 58, 0.5) 100%
            );
            border: 1px solid rgba(239, 167, 63, 0.2);
            border-radius: 16px;
            padding: 32px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .result-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #EFA73F 0%, #258D58 100%);
        }

        .result-section::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                circle at top right,
                rgba(239, 167, 63, 0.05) 0%,
                transparent 50%
            );
            pointer-events: none;
        }

        .result-section:hover {
            background: linear-gradient(
                135deg,
                rgba(45, 53, 97, 0.4) 0%,
                rgba(26, 31, 58, 0.6) 100%
            );
            border-color: rgba(239, 167, 63, 0.3);
            transform: translateX(4px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            color: #f4c15d;
            font-size: 1.3em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-icon {
            font-size: 1.4em;
        }

        .copy-btn {
            background: rgba(239, 167, 63, 0.15);
            border: 1px solid rgba(239, 167, 63, 0.3);
            color: #EFA73F;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover {
            background: rgba(239, 167, 63, 0.25);
            border-color: #EFA73F;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 167, 63, 0.3);
        }

        .copy-btn.copied {
            background: rgba(37, 141, 88, 0.25);
            border-color: #258D58;
            color: #4ade80;
        }

        .section-content {
            color: #e6e6e6;
            line-height: 1.8;
            font-size: 1.05em;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: linear-gradient(135deg, #258D58 0%, #2dd46d 100%);
            color: #FFFFFF;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(37, 141, 88, 0.4);
            font-weight: 600;
            z-index: 1000;
            opacity: 0;
            transform: translateY(100px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Floating Particles */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: #EFA735;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.3;
            z-index: 0;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100px) translateX(50px); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← Back to Home</a>

        <div class="header">
            <h1>Candidate Comparison</h1>
            <p style="color: #a8b2d1;">Compare multiple candidates side-by-side</p>
        </div>

        <div class="card">
            <!-- Mode Indicators -->
            <div class="mode-indicators">
                <div class="mode-badge" id="manualBadge">✍️ Manual Input</div>
                <div class="mode-badge" id="fileBadge">📄 File Mode</div>
            </div>

            <form id="compareForm">
                <!-- File Upload Section -->
                <div class="file-upload-section">
                    <div class="file-upload-area" id="fileUploadArea" onclick="document.getElementById('resumeFiles').click()">
                        <input type="file" id="resumeFiles" name="resumes" accept=".pdf,.doc,.docx,.txt" multiple>
                        <div class="upload-icon">📄</div>
                        <div class="upload-text">Click to upload 2-5 resume files</div>
                        <div class="upload-hint">Supports PDF, DOC, DOCX, TXT (Max 10MB each)</div>
                        <div id="fileCount" class="file-count" style="display: none;"></div>
                    </div>
                </div>

                <!-- Divider -->
                <div class="divider">
                    <span>OR ENTER DETAILS MANUALLY</span>
                </div>

                <!-- Manual Input Section -->
                <div class="form-section" id="manualSection">
                    <label>Job Description:</label>
                    <textarea id="jd" placeholder="Paste the job description here..."></textarea>

                    <label>Candidate 1 Resume:</label>
                    <textarea id="resume1" placeholder="Paste first candidate's resume here..."></textarea>

                    <label>Candidate 2 Resume:</label>
                    <textarea id="resume2" placeholder="Paste second candidate's resume here..."></textarea>

                    <label>Candidate 3 Resume <span class="optional">(optional)</span>:</label>
                    <textarea id="resume3" placeholder="Paste third candidate's resume here (optional)..."></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn" id="submitBtn">
                    <span class="btn-text" id="btnText">Compare Candidates</span>
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                Comparing candidates...
            </div>

            <div class="result" id="result">
                <div class="result-header">
                    <h3>Comparison Results</h3>
                </div>
                <div id="resultText" class="formatted-result"></div>
            </div>

            <div class="toast" id="copyToast">Copied to clipboard!</div>
        </div>
    </div>

    <script>
        let currentMode = 'manual'; // 'manual' or 'file'
        let uploadedFiles = [];

        // Update mode badges
        function updateModeBadges() {
            const manualBadge = document.getElementById('manualBadge');
            const fileBadge = document.getElementById('fileBadge');

            if (currentMode === 'file') {
                manualBadge.classList.remove('active');
                manualBadge.classList.add('inactive');
                fileBadge.classList.remove('inactive');
                fileBadge.classList.add('active');
            } else {
                fileBadge.classList.remove('active');
                fileBadge.classList.add('inactive');
                manualBadge.classList.remove('inactive');
                manualBadge.classList.add('active');
            }
        }

        // Update button text based on mode
        function updateButtonText() {
            const btnText = document.getElementById('btnText');
            if (currentMode === 'file') {
                btnText.textContent = 'Compare Uploaded Resumes';
            } else {
                btnText.textContent = 'Compare Candidates';
            }
        }

        // Handle file upload
        document.getElementById('resumeFiles').addEventListener('change', function(e) {
            uploadedFiles = Array.from(e.target.files);
            const fileCount = uploadedFiles.length;
            const fileCountDiv = document.getElementById('fileCount');
            const fileUploadArea = document.getElementById('fileUploadArea');
            const manualSection = document.getElementById('manualSection');

            if (fileCount > 0) {
                // Switch to file mode
                currentMode = 'file';
                updateModeBadges();
                updateButtonText();

                // Show file count
                fileCountDiv.textContent = `✓ ${fileCount} file${fileCount > 1 ? 's' : ''} selected: ${uploadedFiles.map(f => f.name).join(', ')}`;
                fileCountDiv.style.display = 'inline-block';
                fileUploadArea.classList.add('has-files');

                // Fade manual section
                manualSection.classList.add('faded');
            } else {
                // Switch back to manual mode
                currentMode = 'manual';
                updateModeBadges();
                updateButtonText();

                fileCountDiv.style.display = 'none';
                fileUploadArea.classList.remove('has-files');
                manualSection.classList.remove('faded');
            }
        });

        // Handle manual input changes
        ['jd', 'resume1', 'resume2', 'resume3'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                const hasManualInput = document.getElementById('jd').value.trim() ||
                                       document.getElementById('resume1').value.trim() ||
                                       document.getElementById('resume2').value.trim() ||
                                       document.getElementById('resume3').value.trim();

                if (hasManualInput && uploadedFiles.length === 0) {
                    currentMode = 'manual';
                    updateModeBadges();
                    updateButtonText();
                }
            });
        });

        // Initialize mode badges
        updateModeBadges();

        // Form submission
        document.getElementById('compareForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            document.getElementById('loading').classList.add('active');
            document.getElementById('result').classList.remove('active');

            try {
                let response;

                if (currentMode === 'file' && uploadedFiles.length >= 2) {
                    // File mode - validate
                    const jd = document.getElementById('jd').value.trim();

                    if (!jd) {
                        if (typeof toastError === 'function') {
                            toastError('Missing Job Description', 'Please provide a job description');
                        } else {
                            alert('Please provide a job description');
                        }
                        document.getElementById('loading').classList.remove('active');
                        return;
                    }

                    if (uploadedFiles.length < 2) {
                        if (typeof toastError === 'function') {
                            toastError('Not Enough Files', 'Please upload at least 2 resumes to compare');
                        } else {
                            alert('Please upload at least 2 resumes to compare');
                        }
                        document.getElementById('loading').classList.remove('active');
                        return;
                    }

                    if (uploadedFiles.length > 5) {
                        if (typeof toastError === 'function') {
                            toastError('Too Many Files', 'Maximum 5 resumes can be compared at once');
                        } else {
                            alert('Maximum 5 resumes can be compared at once');
                        }
                        document.getElementById('loading').classList.remove('active');
                        return;
                    }

                    // Send file data
                    const formData = new FormData();
                    formData.append('jd', jd);
                    uploadedFiles.forEach(file => formData.append('resumes', file));

                    response = await fetch('/api/compare-candidates-files', {
                        method: 'POST',
                        body: formData
                    });
                } else {
                    // Manual mode - validate
                    const jd = document.getElementById('jd').value.trim();
                    const resume1 = document.getElementById('resume1').value.trim();
                    const resume2 = document.getElementById('resume2').value.trim();
                    const resume3 = document.getElementById('resume3').value.trim();

                    if (!jd || !resume1 || !resume2) {
                        if (typeof toastError === 'function') {
                            toastError('Missing Information', 'Please provide job description and at least 2 resumes');
                        } else {
                            alert('Please provide job description and at least 2 resumes');
                        }
                        document.getElementById('loading').classList.remove('active');
                        return;
                    }

                    const data = {
                        jd: jd,
                        resumes: [resume1, resume2, resume3].filter(r => r)
                    };

                    response = await fetch('/api/compare-candidates', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }

                const result = await response.json();
                if (result.success) {
                    formatResult(result.comparison);
                    document.getElementById('result').classList.add('active');
                } else {
                    document.getElementById('resultText').innerHTML = '<div class="result-section"><div class="section-content" style="color: #ff6b6b;">Error: ' + result.error + '</div></div>';
                    document.getElementById('result').classList.add('active');
                }
            } catch (error) {
                document.getElementById('resultText').innerHTML = '<div class="result-section"><div class="section-content" style="color: #ff6b6b;">Error: ' + error.message + '</div></div>';
                document.getElementById('result').classList.add('active');
            }

            document.getElementById('loading').classList.remove('active');
        });

        function showToast(message) {
            const toast = document.getElementById('copyToast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        async function copyToClipboard(text, button) {
            try {
                await navigator.clipboard.writeText(text);
                const originalText = button.innerHTML;
                button.innerHTML = '<span style="font-size: 1em;">✓</span> Copied!';
                button.classList.add('copied');
                showToast('Copied to clipboard!');
                setTimeout(() => {
                    button.innerHTML = originalText;
                    button.classList.remove('copied');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy:', err);
                showToast('Failed to copy');
            }
        }

        function formatResult(text) {
            const resultText = document.getElementById('resultText');
            resultText.innerHTML = '';
            const sections = text.split(/\n(?=###\s)/);

            sections.forEach((section, index) => {
                if (!section.trim()) return;

                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'result-section';

                let icon = '👤';
                let title = 'Candidate Comparison';
                let content = section;

                if (section.match(/^###\s+(.+)/m)) {
                    const match = section.match(/^###\s+(.+)/m);
                    title = match[1];
                    content = section.replace(/^###\s+.+\n/m, '');
                }

                if (title.toLowerCase().includes('candidate')) icon = '👤';
                else if (title.toLowerCase().includes('score') || title.toLowerCase().includes('rating')) icon = '⭐';
                else if (title.toLowerCase().includes('strength') || title.toLowerCase().includes('pros')) icon = '✅';
                else if (title.toLowerCase().includes('weakness') || title.toLowerCase().includes('cons')) icon = '⚠️';
                else if (title.toLowerCase().includes('recommend')) icon = '🎯';
                else if (title.toLowerCase().includes('comparison')) icon = '⚖️';
                else if (title.toLowerCase().includes('summary')) icon = '📊';

                const sectionHeader = document.createElement('div');
                sectionHeader.className = 'section-header';

                const sectionTitle = document.createElement('div');
                sectionTitle.className = 'section-title';
                sectionTitle.innerHTML = `<span class="section-icon">${icon}</span>${title}`;

                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerHTML = '<span style="font-size: 1.1em;">📋</span> Copy';
                copyBtn.onclick = () => copyToClipboard(content.trim(), copyBtn);

                sectionHeader.appendChild(sectionTitle);
                sectionHeader.appendChild(copyBtn);

                const sectionContent = document.createElement('div');
                sectionContent.className = 'section-content';
                sectionContent.innerHTML = formatText(content);

                sectionDiv.appendChild(sectionHeader);
                sectionDiv.appendChild(sectionContent);
                resultText.appendChild(sectionDiv);
            });
        }

        function formatText(text) {
            return text
                .replace(/\*\*([^*]+)\*\*/g, '<strong style="color: #f4c15d;">$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em style="color: #b8c1ec;">$1</em>')
                .replace(/`([^`]+)`/g, '<code style="background: rgba(239, 167, 63, 0.15); padding: 2px 8px; border-radius: 4px; color: #EFA73F; font-family: monospace;">$1</code>')
                .replace(/^- (.+)$/gm, '<div style="margin-left: 20px; margin-bottom: 8px;">• $1</div>')
                .replace(/^\d+\. (.+)$/gm, '<div style="margin-left: 20px; margin-bottom: 8px;">$1</div>')
                .replace(/\n\n/g, '<div style="height: 12px;"></div>')
                .replace(/\n/g, '<br>');
        }

        function createParticles() {
            const container = document.body;
            const particleCount = 20;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animation = `floatParticle ${15 + Math.random() * 10}s linear infinite`;
                particle.style.animationDelay = Math.random() * 15 + 's';
                container.appendChild(particle);
            }
        }
        createParticles();
    </script>
    <script src="/components/toast.js"></script>
</body>
</html>
