<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aria AI Recruiting Suite</title>
    <link rel="stylesheet" href="/components/toast.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1A1A1A 0%, #2a2a2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(239, 167, 63, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(37, 141, 88, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-container {
            background: rgba(37, 37, 37, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #3a3a3a;
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s ease-out;
            margin: 20px auto;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-container img {
            height: 50px;
            width: auto;
            margin-bottom: 24px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 8px;
            text-align: center;
        }

        .login-subtitle {
            font-size: 15px;
            color: #e6e6e6;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            background: #1A1A1A;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #FFFFFF;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #EFA73F;
            box-shadow: 0 0 0 3px rgba(239, 167, 63, 0.1);
        }

        .form-group input::placeholder {
            color: #666666;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 24px;
        }

        .forgot-password a {
            color: #EFA73F;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .forgot-password a:hover {
            color: #d89435;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #EFA73F;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            font-family: inherit;
        }

        .login-btn:hover {
            background: #d89435;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(239, 167, 63, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            color: #666666;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #3a3a3a;
        }

        .divider span {
            padding: 0 16px;
        }

        .alternative-login {
            text-align: center;
        }

        .sso-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #FFFFFF;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .sso-btn:hover {
            background: #258D58;
            border-color: #258D58;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(37, 141, 88, 0.3);
        }

        .footer-text {
            text-align: center;
            margin-top: 32px;
            color: #666666;
            font-size: 14px;
        }

        .footer-text a {
            color: #EFA73F;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-text a:hover {
            color: #d89435;
        }

        .password-hint {
            font-size: 13px;
            color: #e6e6e6;
            margin-top: 8px;
            line-height: 1.5;
            background: rgba(239, 167, 63, 0.1);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #EFA73F;
        }

        .password-hint.show {
            color: #EFA73F;
        }

        .show-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #999999;
            cursor: pointer;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .show-password:hover {
            color: #EFA73F;
        }

        .password-wrapper {
            position: relative;
        }

        .signup-highlight {
            background: rgba(239, 167, 63, 0.1);
            border: 1px solid rgba(239, 167, 63, 0.3);
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            margin-top: 24px;
        }

        .signup-highlight p {
            font-size: 14px;
            color: #e6e6e6;
            margin-bottom: 12px;
        }

        .signup-btn-link {
            display: inline-block;
            background: #EFA73F;
            color: #FFFFFF;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .signup-btn-link:hover {
            background: #d89435;
            transform: translateY(-2px);
        }

        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease-in-out;
        }

        .info-message {
            background: rgba(239, 167, 63, 0.1);
            border: 1px solid rgba(239, 167, 63, 0.3);
            color: #EFA73F;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
        }

        .info-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        html {
            overflow-y: auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
                align-items: flex-start;
            }

            .login-container {
                margin: 10px;
                padding: 32px 24px;
            }

            .login-title {
                font-size: 24px;
            }

            .show-password {
                font-size: 12px;
                right: 12px;
            }
        }
    </style>
    <script src="/components/toast.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <img src="https://media.stage.in/static/stage_logo_horizontal.webp" alt="STAGE Logo">
        </div>

        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to Aria AI Recruiting Suite</p>

        <div class="error-message" id="errorMessage">
            Invalid username or password. Please try again.
        </div>

        <div class="info-message" id="infoMessage">
            Your account is pending admin approval.
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="e.g., john.doe@stage.in or johndoe"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" class="show-password" onclick="togglePassword()">Show</button>
                </div>
                <div class="password-hint" id="passwordHint">
                    💡 New users: Passwords must be at least 8 characters
                </div>
            </div>

            <div class="forgot-password">
                <a href="#forgot">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <div class="alternative-login">
            <a href="/auth/google" class="sso-btn" style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 12px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </a>
        </div>

        <div class="signup-highlight">
            <p>Don't have an account?</p>
            <a href="/signup.html" class="signup-btn-link">Create Account</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const infoMessage = document.getElementById('infoMessage');

        // Check URL parameters for status messages
        const urlParams = new URLSearchParams(window.location.search);
        const status = urlParams.get('status');
        const error = urlParams.get('error');
        const email = urlParams.get('email');

        if (status === 'pending') {
            infoMessage.textContent = `Account created successfully! Your Google account (${email || 'your email'}) is pending admin approval. You'll be notified once approved.`;
            infoMessage.classList.add('show');
        } else if (error === 'pending_approval') {
            infoMessage.textContent = 'Your account is pending admin approval. Please contact your administrator.';
            infoMessage.classList.add('show');
        } else if (error === 'account_rejected') {
            errorMessage.textContent = 'Your account has been rejected. Please contact your administrator.';
            errorMessage.classList.add('show');
        } else if (error === 'oauth_failed') {
            errorMessage.textContent = 'Google sign-in failed. Please try again or use username/password.';
            errorMessage.classList.add('show');
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = event.target;

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = 'Hide';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = 'Show';
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Hide previous error
            errorMessage.classList.remove('show');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password }),
                });

                const data = await response.json();

                if (data.success) {
                    // Store session token
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('userRole', data.role);

                    // Show success toast (if available)
                    try {
                        if (typeof toastSuccess === 'function') {
                            toastSuccess('Login Successful!', `Welcome back${data.role === 'admin' ? ', Admin' : ''}!`);
                        }
                    } catch(e) {
                        console.log('Toast not available');
                    }

                    // Redirect based on role after short delay
                    setTimeout(() => {
                        if (data.role === 'admin') {
                            window.location.href = '/admin-users.html';
                        } else {
                            window.location.href = '/index.html';
                        }
                    }, 500);
                } else {
                    // Show error toast (if available)
                    try {
                        if (typeof toastError === 'function') {
                            toastError('Login Failed', data.message || 'Invalid username or password');
                        }
                    } catch(e) {
                        console.log('Toast not available');
                    }

                    // Show in page error message
                    errorMessage.textContent = data.message || 'Invalid username or password. Please try again.';
                    errorMessage.classList.add('show');

                    // Shake the form
                    loginForm.style.animation = 'none';
                    setTimeout(() => {
                        loginForm.style.animation = '';
                    }, 10);
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Network error. Please try again. Error: ' + error.message;
                errorMessage.classList.add('show');
            }
        });

        // SSO is now handled by direct link to /auth/google

        // Handle forgot password
        document.querySelector('.forgot-password a').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Password reset functionality coming soon.\n\nPlease contact your administrator for assistance:\nhr@stage.in');
        });
    </script>
</body>
</html>
